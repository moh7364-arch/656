<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#173d6e"/><link rel="manifest" href="manifest.json"/><title>العقارات | طشّة</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"/></head><body><div class="page-shell"><header class="site-header" data-site-header></header><main><section class="page-hero"><div class="container"><div class="section-head"><span class="section-kicker">استكشف الخيارات</span><h1 style="margin:0">جميع العقارات</h1><p>ابحث حسب المدينة أو النوع أو عدد الضيوف أو السعر، واحفظ ما يعجبك للمفضلة.</p></div><div class="filter-bar"><form id="filtersForm" class="form-grid compact"><label>المدينة<select id="cityFilter"></select></label><label>النوع<select id="typeFilter"></select></label><label>الميزانية القصوى<input id="budgetFilter" type="number" placeholder="مثال: 150"></label><label>عدد الضيوف<input id="guestsFilter" type="number" placeholder="مثال: 6"></label><label>كلمة مفتاحية<input id="searchFilter" type="text" placeholder="اسم العقار أو المدينة"></label><label>الفرز<select id="sortFilter"><option value="recommended">الأكثر ملاءمة</option><option value="price-asc">الأقل سعرًا</option><option value="price-desc">الأعلى سعرًا</option><option value="rating">الأعلى تقييمًا</option></select></label><label><span>مسبح خاص</span><select id="poolFilter"><option value="">الكل</option><option value="yes">نعم</option></select></label><label><span>إعادة ضبط</span><button class="btn btn-secondary btn-block" type="button" id="resetFilters">إعادة الضبط</button></label></form></div><div class="row-between" style="margin-bottom:14px"><div class="meta-list"><span class="meta-item">النتائج: <strong id="resultsCount">0</strong></span><span class="meta-item">المفضلة: <strong data-favorites-count>0</strong></span></div><div class="chip-row"><button class="sample-chip" id="openAiFromProperties">اقتراحات ذكية</button></div></div><div class="cards-grid" id="propertiesGrid"></div></div></section><section class="section alt" id="propertiesAiSection"><div class="container ai-grid"><div><div class="section-head"><span class="section-kicker">اقتراحات ذكية سريعة</span><h2>صف ما تريد وسنقترح الأنسب</h2></div><div class="chip-row" id="propertiesAiChips"></div></div><div class="panel"><div class="chat-window" id="aiResult"><div class="chat-bubble ai">اطلب مثلًا: أريد مكانًا طبيعيًا في عجلون لعائلة من 8 أشخاص.</div></div><label>رسالتك<textarea id="aiPrompt" rows="4" placeholder="صف احتياجك هنا"></textarea></label><button id="runAiBtn" class="btn btn-primary btn-block">إرسال</button></div></div></section></main><footer class="footer" data-site-footer></footer></div><script src="data.js"></script><script src="app.js"></script><script src="properties.js"></script></body></html>
