<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#173d6e"/><link rel="manifest" href="manifest.json"/><title>الدفع | طشّة</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"/><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script></head><body><div class="page-shell"><header class="site-header" data-site-header></header><main><section class="page-hero"><div class="container owner-grid"><div class="panel" id="paymentSummary"></div><div class="panel"><div class="section-head"><span class="section-kicker">إتمام الدفع</span><h1 style="margin:0">بيانات الدفع</h1></div><form id="paymentForm" class="form-grid" style="grid-template-columns:1fr"><label>الاسم على البطاقة<input name="cardName" required placeholder="الاسم كما يظهر على البطاقة"></label><label>رقم البطاقة<input name="cardNumber" required placeholder="4111 1111 1111 1111"></label><label>طريقة الدفع<select name="method"><option value="card">بطاقة بنكية</option><option value="wallet">محفظة إلكترونية</option><option value="bank">تحويل بنكي</option></select></label><label>ملاحظات إضافية<textarea name="notes" rows="4" placeholder="أي ملاحظة متعلقة بالحجز"></textarea></label><button class="btn btn-primary btn-block" type="submit">تأكيد الدفع</button></form><div id="paymentMessage" style="margin-top:16px"></div></div></div></section></main><footer class="footer" data-site-footer></footer></div><script src="data.js"></script><script src="app.js"></script><script src="payment.js"></script></body></html>
