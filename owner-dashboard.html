<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="theme-color" content="#173d6e"/><link rel="manifest" href="manifest.json"/><title>لوحة المالك | طشّة</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"/></head><body><div class="page-shell"><header class="site-header" data-site-header></header><main><section class="page-hero"><div class="container"><div class="section-head"><span class="section-kicker">لوحة المالك</span><h1 style="margin:0">إدارة العقارات والطلبات</h1><p>يمكنك إضافة عقار جديد ومراجعة نظرة عامة على العقارات والحجوزات.</p></div><div class="dashboard-grid"><div class="panel"><div class="kpi" id="ownerListingsCount">0</div><small>العقارات الخاصة بي</small></div><div class="panel"><div class="kpi" id="ownerBookingsCount">0</div><small>الحجوزات</small></div><div class="panel"><div class="kpi" id="ownerRevenueCount">0</div><small>إجمالي الدفعات</small></div><div class="panel"><div class="kpi" data-users-count>0</div><small>المستخدمون</small></div></div><div class="owner-grid" style="margin-top:18px"><div class="panel"><h3>إضافة عقار</h3><form id="ownerForm" class="form-grid"><label>اسم العقار<input name="name" required></label><label>المدينة<select name="city"><option>عمّان</option><option>العقبة</option><option>جرش</option><option>إربد</option><option>عجلون</option><option>الزرقاء</option><option>الكرك</option></select></label><label>النوع<select name="type"><option>مزرعة</option><option>شاليه</option><option>فيلا</option><option>شقة فندقية</option><option>منتجع</option></select></label><label>السعر<input name="price" type="number" required></label><label>عدد الضيوف<input name="guests" type="number" required></label><label>مسبح<select name="pool"><option value="yes">نعم</option><option value="no">لا</option></select></label><label style="grid-column:1/-1">الموقع<input name="location"></label><label style="grid-column:1/-1">وصف العقار<textarea name="description" rows="4"></textarea></label><label style="grid-column:1/-1"><button class="btn btn-primary btn-block">حفظ العقار</button></label></form><div id="ownerMessage" style="margin-top:12px"></div></div><div><div class="table-list" id="ownerListings"></div></div></div></div></section></main><footer class="footer" data-site-footer></footer></div><script src="data.js"></script><script src="app.js"></script><script src="owner.js"></script></body></html>
